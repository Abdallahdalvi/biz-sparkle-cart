version: '3.8'

services:
  techlab-storefront:
    image: ghcr.io/abdallahdalvi/biz-sparkle-cart:latest
    container_name: techlab-storefront
    restart: unless-stopped
    ports:
      - "9999:9999"
    environment:
      - PORT=9999
      - NODE_ENV=production
      - VITE_SUPABASE_URL=https://supabase.dalvi.cloud
      - VITE_SUPABASE_PUBLISHABLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzgwNTE2MDU5LCJleHAiOjQxMDI0NDQ4MDB9.pnle16TS5HXFkORp9nrU5GMbTU3BaNf8XzLfguweAUg
      - VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzgwNTE2MDU5LCJleHAiOjQxMDI0NDQ4MDB9.pnle16TS5HXFkORp9nrU5GMbTU3BaNf8XzLfguweAUg
      - SUPABASE_URL=https://supabase.dalvi.cloud
      - SUPABASE_PUBLISHABLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzgwNTE2MDU5LCJleHAiOjQxMDI0NDQ4MDB9.pnle16TS5HXFkORp9nrU5GMbTU3BaNf8XzLfguweAUg
      - SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE3ODA1MTYwNTksImV4cCI6NDEwMjQ0NDgwMH0.ppjSFKACErgEsMw-jx-mEyY6-ifFqQlkpPQjQVKYrX8
      - RAZORPAY_KEY_ID=
      - RAZORPAY_KEY_SECRET=
      - RAZORPAY_WEBHOOK_SECRET=
      - SHIPROCKET_EMAIL=
      - SHIPROCKET_PASSWORD=
      - SHIPROCKET_PICKUP_LOCATION=Primary
    network_mode: bridge
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Optional Watchtower service to automatically update CasaOS container when new images are pushed to GitHub Container Registry
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower-updater
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 techlab-storefront
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=false
